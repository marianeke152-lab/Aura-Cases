<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aura Cases</title>

<style>
:root{
    --principal:#7D0732;
    --secundario:#A63D69;
    --fondo:#F0EAD9;
    --texto:#2B2B2B;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--fondo);
    color:var(--texto);
}

header{
    background:var(--principal);
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:2rem;
}

.buscador{
    padding:20px;
    display:flex;
    justify-content:center;
}

input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:2px solid var(--principal);
    border-radius:10px;
}

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.precio{
    color:var(--principal);
    font-size:1.2rem;
    font-weight:bold;
    margin:10px 0;
}

button{
    width:100%;
    border:none;
    padding:12px;
    background:var(--principal);
    color:white;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:var(--secundario);
}

.carrito{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--principal);
    color:white;
    padding:15px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>Aura Cases</h1>
    <p>Fundas para iPhone</p>
</header>

<div class="buscador">
    <input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="productos" id="productos"></div>

<div class="carrito" onclick="enviarWhatsApp()">
🛒 Pedido (<span id="cantidad">0</span>)
</div>

<script>

const productos = [
{
modelo:"iPhone 13",
nombre:"Funda Transparente",
precio:6500,
imagen:"https://via.placeholder.com/400x400?text=iPhone+13"
},
{
modelo:"iPhone 14",
nombre:"Funda Silicona Negra",
precio:7000,
imagen:"https://via.placeholder.com/400x400?text=iPhone+14"
},
{
modelo:"iPhone 15 Pro",
nombre:"Funda Antigolpes",
precio:8500,
imagen:"https://via.placeholder.com/400x400?text=iPhone+15+Pro"
}
];

const carrito = [];

function mostrarProductos(lista){

const contenedor = document.getElementById("productos");

contenedor.innerHTML="";

lista.forEach(producto=>{

contenedor.innerHTML += `
<div class="card">

<img src="${producto.imagen}">

<div class="info">
<h3>${producto.modelo}</h3>
<p>${producto.nombre}</p>

<div class="precio">
$${producto.precio.toLocaleString()}
</div>

<button onclick='agregar(${JSON.stringify(producto)})'>
Agregar al pedido
</button>

</div>
</div>
`;
});
}

function agregar(producto){

carrito.push(producto);

document.getElementById("cantidad").innerText =
carrito.length;

alert("Agregado al pedido");
}

function enviarWhatsApp(){

if(carrito.length===0){
alert("No hay productos");
return;
}

let mensaje =
"Hola Aura Cases, quiero pedir:%0A%0A";

let total=0;

carrito.forEach(p=>{

mensaje +=
`• ${p.modelo} - ${p.nombre} - $${p.precio}%0A`;

total += p.precio;
});

mensaje += `%0ATotal: $${total}`;

window.open(
`https://wa.me/5493435126095?text=${mensaje}`,
"_blank"
);
}

mostrarProductos(productos);

document
.getElementById("buscar")
.addEventListener("input",function(){

const texto = this.value.toLowerCase();

const filtrados = productos.filter(p=>
p.modelo.toLowerCase().includes(texto)
);

mostrarProductos(filtrados);

});

</script>

</body>
</html>
