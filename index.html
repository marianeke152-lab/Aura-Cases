<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aura Cases</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<header>
    <h1>Aura Cases</h1>
    <p>Fundas Premium para iPhone</p>
</header>

<section class="busqueda">

    <input
        type="text"
        id="buscar"
        placeholder="Buscar modelo..."
    >

    <div class="categorias">
        <button onclick="filtrarModelo('')">Todos</button>
        <button onclick="filtrarModelo('11')">iPhone 11</button>
        <button onclick="filtrarModelo('12')">iPhone 12</button>
        <button onclick="filtrarModelo('13')">iPhone 13</button>
        <button onclick="filtrarModelo('14')">iPhone 14</button>
        <button onclick="filtrarModelo('15')">iPhone 15</button>
    </div>

</section>

<main>

    <section id="productos" class="productos"></section>

    <aside class="carrito">

        <h2>Tu pedido</h2>

        <div id="listaCarrito"></div>

        <div class="total">
            Total: $<span id="total">0</span>
        </div>

        <button class="whatsapp" onclick="enviarWhatsApp()">
            Enviar por WhatsApp
        </button>

    </aside>

</main>

<footer>
    <p>📍 Paraná, Entre Ríos</p>
    <p>📲 3435126095</p>
</footer>

<script src="script.js"></script>

</body>
</html>
